worker_processes auto;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            allow publish all;
            allow play all;

            # Webhooks al express server del POC.
            # host.docker.internal apunta al host (definido en docker-compose extra_hosts).
            on_publish http://host.docker.internal:3000/api/stream/on-publish;
            on_publish_done http://host.docker.internal:3000/api/stream/on-publish-done;

            # Grabar stream a segmentos de 60s para audit clip (B-08).
            record all;
            record_path /tmp/record;
            record_unique on;
            record_interval 60s;
            record_suffix _%Y-%m-%d_%H-%M-%S.flv;
        }
    }
}

http {
    server {
        listen 80;

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        location / {
            return 200 "addie-rtmp · /stat for stream stats\n";
            add_header Content-Type text/plain;
        }
    }
}
