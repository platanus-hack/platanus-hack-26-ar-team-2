# IMPORTANTE: 1 solo worker. nginx-rtmp NO comparte estado de streams entre
# workers, así que con auto-workers /stat puede devolver datos inconsistentes
# (request lo agarra un worker que no tiene el stream).
worker_processes 1;
error_log /dev/stderr info;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            allow publish all;
            allow play all;

            # Webhooks al express server del POC.
            # host.docker.internal apunta al host (definido en docker-compose extra_hosts).
            on_publish http://host.docker.internal:3000/api/stream/on-publish;
            on_publish_done http://host.docker.internal:3000/api/stream/on-publish-done;

            # NOTE: record desactivado para fase 1. B-08 lo va a re-habilitar
            # con un volume con permisos correctos para el audit clip pipeline.
        }
    }
}

http {
    access_log /dev/stdout;
    server {
        listen 80;

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        location / {
            return 200 "addie-rtmp · /stat for stream stats\n";
            add_header Content-Type text/plain;
        }
    }
}
