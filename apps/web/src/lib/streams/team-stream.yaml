# Stream metadata para el demo (Platanus Hack BSAS, 2026-05-10 12:00 ART).
# Lo consume gate1 al match contra event_filters de cada brand.
# Ver docs/GATES.md §5.

# ─── Dos identificadores distintos (no confundir) ─────────────────────
#
# stream_id  = `team-stream`   ← interno de Addie. RTMP path / stream_key
#                                  que OBS publica a nginx-rtmp y que el
#                                  pipeline `on_publish` recibe como `name=`.
#                                  Es también el filename de este YAML
#                                  (loader resuelve por filename).
#
# streamer   = `jerebacher`    ← handle de Twitch real. El equipo reusa el
#                                  canal personal de Jere para el demo.
#                                  Lo consume tmi.js (chat IRC `#jerebacher`)
#                                  y la Helix API para `viewer_count`/`game`.
#                                  En prod va en env var TWITCH_CHANNEL o
#                                  en `accounts.metadata.twitch_channel`
#                                  (per-session lookup, ver poc/pipeline/README.md).
#
# Ambos quedan registrados acá para que el lookup runtime sea trivial.

stream_id: team-stream
streamer: "jerebacher"
category: just_chatting                   # categoría amplia → más brands matchean
game: null
language: es-AR

# Dayparts esperados — cuándo el stream va a estar al aire durante el hackaton.
# El demo cae 12:00 ART → "midday_arg".
expected_dayparts:
  - midday_arg                            # cubre el demo
  - evening_arg                           # cubre rehearsals previos

# Topics que el speaker va a tocar durante el pitch (Bloques 1-5).
# Útil para baseline de gate2 embedding cuando arranque la sesión.
expected_topics:
  - "demo de Addie en vivo"
  - "agentes negociando ads en streams"
  - "mandates firmados por las marcas"
  - "escrow on-chain en USDC sobre Base"
  - "matcher win-win-win streamer/marca/viewer"

# Trigger words ensayadas del Bloque 3 — el operador del dashboard puede
# usarlas para validar pre-demo que el pipeline detecta los moods correctos.
# Ver docs/PITCH.md §"Notas de calibración".
rehearsed_triggers:
  - word: "ÉPICO"
    expected_mood: high_energy
  - word: "CLUTCH"
    expected_mood: high_energy
  - word: "TRANQUI"
    expected_mood: casual_chat
  - word: "FOGÓN"
    expected_mood: casual_chat

# Audience profile esperado para el demo de hackathon.
# La audiencia EN TWITCH (canal jerebacher) durante el pitch es minúscula —
# los jurados miran físicamente, no por el stream. Realísticamente 2-10
# viewers conectados (followers casuales de Jere + curiosos del hackathon).
# Esto baseline calibra `matebros.max_viewers` (= 2): MateBros skipea cuando
# hay >2 viewers, dando el SKIP literal "audiencia muy grande" del PITCH.
audience:
  expected_viewers_min: 2
  expected_viewers_max: 10
  primary_locale: es-AR
