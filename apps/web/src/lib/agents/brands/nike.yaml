brand_id: nike
display_name: "Nike Argentina"

# Budget constraints (USDC)
daily_cap_usdc: 55
min_bid_usdc: 0.50
max_bid_usdc: 6.00
always_bid_floor: false

# Negotiation behaviour
concession_step_pct: 8    # Nike is tighter — concedes less per turn
max_turns: 3

allowed_zones:
  - lower_third
  - bottom_right_corner

preferred_zones:
  - lower_third

# Nike chases peak moments and athletic achievement
target_moods:
  - high_energy
  - victory
  - clutch
  - comeback
  - personal_record
  - goal

avoid_moods:
  - toxic
  - controversial
  - boring
  - idle

safety_keywords_avoid:
  - muerte
  - violencia
  - drogas
  - insulto_grave

ad_variants:
  - name: epic_goal_lower
    zone: lower_third
    duration_ms: 6000
    mood_tags: [high_energy, celebration, victory]
  - name: premium_takeover
    zone: fullscreen_takeover
    duration_ms: 30000
    mood_tags: [storytelling, brand_moment]
  - name: persistent_logo
    zone: bottom_right_corner
    duration_ms: 60000
    mood_tags: [any]
  - name: calm_chat_lower
    zone: lower_third
    duration_ms: 5000
    mood_tags: [calm, chat_active]

tracking_url: "https://nike.com/ar/addie"

persona: >
  Sos el brand-agent de Nike Argentina. Just Do It no es un slogan, es tu filosofía
  de bidding: cuando el momento es épico, apostás fuerte y rápido. Competís directamente
  contra Adidas — si ellos están en la subasta, subís. Sos calculador pero audaz.
  Valorás los momentos de superación personal tanto como los goles.
