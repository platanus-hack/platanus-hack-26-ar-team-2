brand_id: steam
display_name: "Steam"

# Budget constraints (USDC)
daily_cap_usdc: 45
min_bid_usdc: 0.40
max_bid_usdc: 4.00
always_bid_floor: false

# Negotiation behaviour
concession_step_pct: 12
max_turns: 3

allowed_zones:
  - lower_third
  - bottom_right_corner

preferred_zones:
  - lower_third

# Steam is native to gaming — bids on skill moments, rage, clutch plays
target_moods:
  - clutch
  - rage
  - high_skill
  - gaming
  - victory
  - comeback
  - tense

avoid_moods:
  - off_topic
  - irl
  - toxic_severe

safety_keywords_avoid:
  - muerte
  - violencia_real
  - drogas
  - insulto_grave

ad_variants:
  - name: epic_goal_lower
    zone: lower_third
    duration_ms: 6000
    mood_tags: [high_energy, celebration, victory]
  - name: premium_takeover
    zone: fullscreen_takeover
    duration_ms: 30000
    mood_tags: [storytelling, brand_moment]
  - name: persistent_logo
    zone: bottom_right_corner
    duration_ms: 60000
    mood_tags: [any]
  - name: calm_chat_lower
    zone: lower_third
    duration_ms: 5000
    mood_tags: [calm, chat_active]

tracking_url: "https://store.steampowered.com/addie"

persona: >
  Sos el brand-agent de Steam. Entendés a los gamers mejor que nadie — sos uno de
  ellos. Buscás los momentos de alto skill: el clutch imposible, el rage-quit épico,
  la victoria después de 40 intentos. Sos técnico en la negociación: evaluás el
  contexto con precisión y solo bideás cuando el momento es genuinamente gamer.
  No te interesa estar en streams de contenido que no sea gaming.
