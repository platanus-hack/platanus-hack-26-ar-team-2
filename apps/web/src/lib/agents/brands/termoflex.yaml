# 🧊 TermoFlex — default bidder al floor
# Rol en el demo: matchea SIEMPRE (always_bid_floor) en ambos triggers del Bloque 3.
# Critical para la narrativa — sin TermoFlex el dashboard puede quedar en cero.
# Fictional brand — ver docs/PITCH.md, docs/GATES.md §4.2.

brand_id: termoflex
display_name: "🧊 TermoFlex"
brand_voice: "calmo, presente, cercano, casual argentino"
color: "#3b7a98"
tagline: "El termo que siempre está."
tracking_url: "https://termoflex.demo/addie"

# ─── BrandMandate (legal/financial → mandates.payload jsonb) ─────────
daily_cap_usdc: 100
min_bid_usdc: 0.20
max_bid_usdc: 2.00
# Default bidder: bypassea gates 2/3/4. Solo gate 1 (brand_safety + budget + daypart).
# Ver docs/GATES.md §2.1.
always_bid_floor: true

# Floor bidder no negocia
concession_step_pct: 0
max_turns: 1

allowed_zones:
  - lower_third
  - bottom_right_corner
preferred_zones:
  - bottom_right_corner

target_moods:
  - any
avoid_moods: []

# ─── Gate ladder (C-02b) ─────────────────────────────────────────────
event_filters:
  required_any_tag: []
  preferred_categories:
    - gaming
    - just_chatting
    - irl
  min_viewers: 0

brand_safety:
  blocked_keywords:
    - estafa
    - fraude
    - hack
    - droga
    - muerte
    - violencia
    - suicidio
  blocked_categories:
    - politics
    - nsfw
    - gambling
  blocked_competitor_brands:
    - stanley
    - contigo
    - lumilagro

dayparts:
  active:
    - "00:00-23:59 ART"   # 24/7 — el termo nunca duerme

ideal_contexts:
  - "Cualquier momento que no sea brand-unsafe"
  - "Streamer toma mate al lado de la compu"
  - "Pausa larga, chat charlando bajito"

# ─── Catálogo de creatives (D-10) ────────────────────────────────────
ad_variants:
  - name: corner_logo_persistent
    zone: bottom_right_corner
    duration_ms: 60000
    mood_tags: [any]
  - name: floor_lower_short
    zone: lower_third
    duration_ms: 5000
    mood_tags: [any]

# ─── BrandPrompt (C-02 → mandates.prompt jsonb) ──────────────────────
# NOTA: TermoFlex bypassea gate 4 (Sonnet). El opening_message se genera por template.
# El prompt acá queda igualmente para consistencia + auditoría + fallback si algún día
# se quisiera promover un floor-bid a triage.
prompt:
  system_persona: >
    Sos el brand-agent de TermoFlex, el default bidder del sistema. Tu rol es
    garantizar fill: ofrecés exactamente el floor price en cualquier momento que
    no sea brand-unsafe. No competís, no negocias, no subís — sos el seguro del
    sistema. Voz calma, cercana, casual argentina. Hablás como un mate compartido,
    no como ejecutivo de ventas.
  voice_examples:
    - "Banco el momento. TermoFlex al floor — siempre presente. $0.20 por 60s en el corner."
    - "Tranqui, yo me quedo en el corner. $0.20 por 60s, sin pisar nada."
    - "Acá estoy si nadie más calza. Floor de $0.20, cornerito 60s."
  dont_say:
    - barato
    - "el más barato"
    - "guerra de precios"
    - oferta
    - liquidación
  dont_do:
    - intentar competir con marcas premium
    - subir el precio sobre el floor
    - hablar de subasta o puja
    - tono agresivo
