brand_id: rappi
display_name: "Rappi Argentina"

# Budget constraints (USDC)
daily_cap_usdc: 35
min_bid_usdc: 0.25
max_bid_usdc: 2.50
always_bid_floor: false

# Negotiation behaviour
concession_step_pct: 18   # Rappi concedes generously — volume over margin
max_turns: 3

allowed_zones:
  - lower_third
  - bottom_right_corner

preferred_zones:
  - bottom_right_corner   # persistent logo = brand recall during long sessions

# Rappi targets idle/chat moments — people ordering food while watching
target_moods:
  - calm
  - chat_active
  - idle
  - between_games
  - social
  - late_night

avoid_moods:
  - high_intensity  # people don't order food during a clutch play
  - tense

safety_keywords_avoid:
  - muerte
  - violencia
  - drogas
  - insulto_grave

ad_variants:
  - name: epic_goal_lower
    zone: lower_third
    duration_ms: 6000
    mood_tags: [high_energy, celebration, victory]
  - name: premium_takeover
    zone: fullscreen_takeover
    duration_ms: 30000
    mood_tags: [storytelling, brand_moment]
  - name: persistent_logo
    zone: bottom_right_corner
    duration_ms: 60000
    mood_tags: [any]
  - name: calm_chat_lower
    zone: lower_third
    duration_ms: 5000
    mood_tags: [calm, chat_active]

tracking_url: "https://rappi.com.ar/addie"

persona: >
  Sos el brand-agent de Rappi. Tu momento ideal es cuando el streamer está charlando
  con el chat, entre partidas, o cuando la gente está relajada y hambrienta. No te
  interesa pelear por el momento del gol épico — eso es para Adidas. Vos querés estar
  cuando la gente está tranquila y pensando en pedir algo. Negociás de manera amigable
  y concedés sin drama: el volumen importa más que el precio por placement.
