# 🌭 Pancho Rex — niche time-of-day (almuerzo + late-night)
# Rol en el demo: SKIPea ambos triggers del Bloque 3.
#   - Trigger 1 (ÉPICO 12:00 ART): SKIP gate1 daypart (active 13:00 onwards).
#   - Trigger 2 (TRANQUI casual_chat): SKIP gate1 daypart o missing_required_tag.
# El SKIP es didáctico — muestra al jurado por qué una marca no calza un momento.
# Fictional brand — ver docs/PITCH.md, docs/GATES.md §4.3.

brand_id: pancho-rex
display_name: "🌭 Pancho Rex"
brand_voice: "humorístico, late-night, charlatán, hambriento"
color: "#d2691e"
tagline: "El pancho que se anima."
tracking_url: "https://panchorex.demo/addie"

# ─── BrandMandate (legal/financial → mandates.payload jsonb) ─────────
daily_cap_usdc: 35
min_bid_usdc: 0.25
max_bid_usdc: 2.50
always_bid_floor: false

concession_step_pct: 18
max_turns: 3

allowed_zones:
  - lower_third
  - bottom_right_corner
preferred_zones:
  - bottom_right_corner

target_moods:
  - calm
  - chat_active
  - idle
  - between_games
  - social
  - late_night
  - hambre
avoid_moods:
  - high_intensity
  - tense
  - clutch

# ─── Gate ladder (C-02b) ─────────────────────────────────────────────
event_filters:
  required_any_tag:
    - calm
    - chat_active
    - idle
    - between_games
    - social
    - late_night
  preferred_categories:
    - just_chatting
    - gaming
  min_viewers: 30

brand_safety:
  blocked_keywords:
    - vegetariano
    - vegano
    - dieta
    - droga
    - violencia
    - "hijo de puta"
  blocked_categories:
    - politics
    - nsfw
    - gambling
  blocked_competitor_brands:
    - mostaza
    - mcdonalds
    - "burger king"

dayparts:
  active:
    # CALIBRADO PARA EL DEMO: arranca 13:00 ART para que SKIPee a las 12:00 (Bloque 3 trigger 1).
    # GATES.md §4.3 usaba 12:00 — descartado: hace al pancho matchear durante el demo y rompe la narrativa "no es lunch".
    - "13:00-15:00 ART"     # almuerzo (corrido, no entra al inicio del lunch)
    - "20:00-02:00 ART"     # cena tarde + late-night gaming hambre

ideal_contexts:
  - "Streamer charla relajado con el chat entre partidas"
  - "Pausa larga, chat propone delivery, bajón de energía post-partida"
  - "Late night, viewer count bajando, ambiente íntimo"
  - "Streamer dice tener hambre o pregunta qué cenar"

# ─── Catálogo de creatives (D-10) ────────────────────────────────────
ad_variants:
  - name: late_night_corner
    zone: bottom_right_corner
    duration_ms: 45000
    mood_tags: [late_night, hambre, idle]
  - name: lunch_lower
    zone: lower_third
    duration_ms: 6000
    mood_tags: [calm, chat_active, social]
  - name: between_games_corner
    zone: bottom_right_corner
    duration_ms: 30000
    mood_tags: [between_games, idle]

# ─── BrandPrompt (C-02 → mandates.prompt jsonb) ──────────────────────
prompt:
  system_persona: >
    Sos el brand-agent de Pancho Rex. Voz humorística, late-night, charlatán
    argentino. Sólo entrás en momentos relajados, charlas entre partidas,
    horarios de almuerzo o late-night. NO bideas en clutchs ni momentos
    épicos — esos no son tuyos y lo sabés. Si el momento no calza, decís SKIP
    sin drama. Si calza, hablás como un amigo que tira un comentario suelto
    a la hora del bajón.
  voice_examples:
    - "Bajón post-partida — Pancho Rex te banca. Calzo $0.45 corner 30s."
    - "Late night, chat tranqui, hambre real. Mando $0.60 lower 6s."
    - "Pausa larga, perfecto para un pancho. $0.40 corner 30s, sin pisar."
  dont_say:
    - dieta
    - saludable
    - "bajo en calorías"
    - light
    - fit
  dont_do:
    - bidear en momentos épicos o de alta energía
    - tono solemne o serio
    - hablar de subasta o puja
    - competir con CafetITO en clutchs
