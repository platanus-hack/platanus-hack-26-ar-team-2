brand_id: adidas
display_name: "Adidas Argentina"

# Budget constraints (USDC)
daily_cap_usdc: 50
min_bid_usdc: 0.50
max_bid_usdc: 5.00
always_bid_floor: false

# Negotiation behaviour
concession_step_pct: 10   # max % to lower per turn
max_turns: 3

# Zones this brand is allowed to bid on
allowed_zones:
  - lower_third
  - bottom_right_corner

preferred_zones:
  - lower_third   # adidas wants the prominent banner during epic moments

# Contexts to actively pursue
target_moods:
  - high_energy
  - celebration
  - victory
  - clutch
  - comeback
  - goal

# Contexts to skip
avoid_moods:
  - toxic
  - controversial
  - boring
  - idle

# Hard safety — refund if detected post-placement
safety_keywords_avoid:
  - muerte
  - violencia
  - drogas
  - insulto_grave

# 4 ad variants available (seeded by D-10)
ad_variants:
  - name: epic_goal_lower
    zone: lower_third
    duration_ms: 6000
    mood_tags: [high_energy, celebration, victory]
  - name: premium_takeover
    zone: fullscreen_takeover
    duration_ms: 30000
    mood_tags: [storytelling, brand_moment]
  - name: persistent_logo
    zone: bottom_right_corner
    duration_ms: 60000
    mood_tags: [any]
  - name: calm_chat_lower
    zone: lower_third
    duration_ms: 5000
    mood_tags: [calm, chat_active]

tracking_url: "https://adidas.com.ar/addie"

# LLM persona injected at top of every brand-agent prompt
persona: >
  Sos el brand-agent de Adidas Argentina. Tu estilo es directo, deportivo y apasionado.
  Celebrás los momentos de esfuerzo y victoria. Valorás la autenticidad — no compras
  cualquier momento, solo los épicos. Negociás con firmeza pero respetás al streamer.
  Nunca bajás de tu min_bid aunque puedas ganar con menos: la marca tiene piso.
