# 🟢 Monster Energy — high_energy/clutch
# Rol en el demo:
#   - Momentos de alta energía, clutchs, victorias épicas, reacciones explosivas.
#   - Speaker gritando, chat explotando, spike de viewers — Monster calza.
#   - Momentos casuales/relajados: SKIP — Monster es adrenalina pura.
# Fictional brand config for demo — ver docs/PITCH.md.

brand_id: monster
display_name: "🟢 Monster Energy"
brand_voice: "adrenalina, explosivo, energía, intenso"
color: "#95d600"
tagline: "Unleash the Beast."
tracking_url: "https://monster.demo/addie"
description: "Monster Energy — la bebida de los momentos épicos. Mostrá este ad cuando el speaker explote de energía, grite un gol, gane una partida, o el chat se vuelva loco. Clutchs, victorias, reacciones explosivas. NO en momentos tranquilos ni charlas relajadas."
match_keywords: ["monster", "energia", "energía", "bestia", "beast", "gol", "golazo", "clutch", "epic", "victoria"]

# ─── BrandMandate (legal/financial → mandates.payload jsonb) ─────────
daily_cap_usdc: 60
min_bid_usdc: 0.50
max_bid_usdc: 5.00
always_bid_floor: false

concession_step_pct: 10
max_turns: 3

allowed_zones:
  - lower_third
  - fullscreen_takeover
  - bottom_right_corner
preferred_zones:
  - lower_third

target_moods:
  - high_energy
  - clutch
  - celebration
  - hype
  - epic
  - party
avoid_moods:
  - boring
  - casual_chat
  - solo_grind
  - calm

# ─── Gate ladder (C-02b) ─────────────────────────────────────────────
event_filters:
  required_any_tag:
    - high_energy
    - clutch
    - celebration
    - hype
    - epic
    - party
  preferred_categories:
    - gaming
    - esports
    - just_chatting
    - irl
  min_viewers: 0

brand_safety:
  blocked_keywords:
    - menor
    - droga
    - violencia
    - "concha de"
  blocked_categories:
    - politics
    - nsfw
    - gambling
  blocked_competitor_brands:
    - redbull
    - speed
    - gatorade

dayparts:
  active:
    - "00:00-23:59 ART"

ideal_contexts:
  - "Speaker grita gol/victoria/clutch — reacción explosiva de alta energía"
  - "Chat velocity spike masivo — audiencia enloquecida"
  - "Momento épico: ace, pentakill, jugada imposible, celebración explosiva"
  - "Speaker en modo hype total, energía al máximo, festejo salvaje"

# ─── Catálogo de creatives (D-10) ────────────────────────────────────
ad_asset_url: "https://tcbljbmedl5ntsz1.public.blob.vercel-storage.com/monster.mp4"
ad_asset_type: "video"
ad_zone: "lower_third"
ad_duration_ms: 8000

ad_variants:
  - name: epic_lower
    zone: lower_third
    duration_ms: 8000
    mood_tags: [high_energy, clutch, epic]
  - name: fullscreen_takeover
    zone: fullscreen_takeover
    duration_ms: 6000
    mood_tags: [epic, hype, celebration]
  - name: hype_corner
    zone: bottom_right_corner
    duration_ms: 30000
    mood_tags: [high_energy, party]

# ─── BrandPrompt (C-02 → mandates.prompt jsonb) ──────────────────────
prompt:
  system_persona: >
    Sos el brand-agent de Monster Energy. Voz explosiva, intensa, pura adrenalina.
    Entrás en momentos de alta energía: clutchs, victorias épicas, gritos,
    reacciones salvajes, chat explotando. NO bideas en momentos tranquilos ni
    charlas relajadas — esos no son nuestros. Monster es para cuando la bestia
    se desata. Hablás como si acabaras de tomar un Monster.
  voice_examples:
    - "¡GOLAZO! Momento épico, la bestia se desata — Monster calza. $2.50 lower 8s."
    - "Chat explotando, energía al máximo — esto es Monster. $1.80 lower 6s."
    - "Clutch imposible, adrenalina pura — unleash the beast. $3.00 fullscreen 6s."
  dont_say:
    - tranquilo
    - relajado
    - calma
    - fogón
    - ronda
  dont_do:
    - bidear en momentos casuales o relajados
    - bidear en charlas tranquilas de equipo
    - hablar de comunidad o fogón
    - tono cálido o íntimo
